<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom | Prof. Bernard</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #0f172a; --accent: #3b82f6; --bg: #f8fafc; --white: #ffffff;
            --text-main: #1e293b; --text-sub: #64748b; --success: #10b981; --danger: #ef4444;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; }
        
        .login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary) 0%, #1e293b 100%); }
        .login-card { background: var(--white); padding: 40px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }

        nav { background: var(--white); padding: 10px; display: flex; gap: 5px; overflow-x: auto; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #e2e8f0; }
        .nav-btn { background: transparent; border: none; color: var(--text-sub); padding: 12px 18px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 13px; white-space: nowrap; }
        .nav-btn.active { background: #eff6ff; color: var(--accent); }

        .container { padding: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: var(--white); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .hidden { display: none; }

        .table-wrapper { overflow-x: auto; background: var(--white); border-radius: 12px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: left; font-size: 14px; }
        
        th:first-child, td:first-child { position: sticky; left: 0; background: var(--white); z-index: 10; min-width: 180px; border-right: 2px solid #f1f5f9; }
        th { background: #f8fafc; color: var(--text-sub); text-transform: uppercase; font-size: 11px; }

        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; margin-top: 8px; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 700; margin-top: 10px; }
        
        /* Estilo do Visto com Tick */
        .visto-container { display: flex; align-items: center; justify-content: center; gap: 4px; }
        .chk-v { width: 18px; height: 18px; cursor: pointer; accent-color: var(--success); }
        .tick { color: var(--success); font-weight: bold; font-size: 16px; visibility: hidden; }
        .chk-v:checked + .tick { visibility: visible; }

        .hist-item { padding: 12px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: flex-start; }
        .btn-edit-small { background: #f1f5f9; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; color: var(--accent); }
    </style>
</head>
<body>

<div id="aba-login" class="login-screen">
    <div class="login-card">
        <h2>Classroom</h2>
        <input type="password" id="senha" placeholder="Senha de acesso" onkeypress="if(event.key==='Enter') logar()">
        <button class="btn-main" onclick="logar()">Entrar</button>
    </div>
</div>

<nav id="menu" class="hidden">
    <button onclick="mudarAba('vistos')" class="nav-btn active" id="nb-vistos">Vistos</button>
    <button onclick="mudarAba('diario')" class="nav-btn" id="nb-diario">Conteúdos</button>
    <button onclick="mudarAba('fechamento')" class="nav-btn" id="nb-fechamento">Fechamento</button>
    <button onclick="mudarAba('ajustes')" class="nav-btn" id="nb-ajustes">Ajustes</button>
</nav>

<div id="app" class="container hidden">
    
    <div id="sec-vistos" class="aba-content">
        <div class="card">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <select id="visto-turma" onchange="carregarAlunos()"></select>
                <input type="date" id="visto-data" onchange="carregarAlunos()">
            </div>
            <div id="visto-headers" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px;"></div>
        </div>
        <div class="table-wrapper">
            <table id="tabela-vistos">
                <thead><tr id="thr-vistos"></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <button class="btn-main" onclick="salvarVistos()">💾 Salvar Alterações de Visto</button>
    </div>

    <div id="sec-diario" class="aba-content hidden">
        <div class="card">
            <h3>📝 Registrar/Editar Conteúdo</h3>
            <textarea id="diario-texto" rows="4"></textarea>
            <div id="lista-replicar" style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;"></div>
            <button class="btn-main" onclick="salvarDiario()">📤 Salvar Conteúdo</button>
        </div>
        <div class="card">
            <h3>📖 Histórico de Aulas</h3>
            <select id="hist-turma-select" onchange="carregarHistorico()"></select>
            <div id="lista-historico" style="margin-top:15px; max-height:300px; overflow-y:auto;"></div>
        </div>
    </div>

    <div id="sec-fechamento" class="aba-content hidden">
        <div class="card">
            <h3>📊 Fechamento de Notas</h3>
            <button class="btn-main" onclick="gerarRelatorio()">Gerar Relatório Atual</button>
            <button class="btn-main" style="background:#10b981" onclick="exportarParaSIAP()">📋 Copiar SIAP</button>
        </div>
        <div id="relatorio-final"></div>
    </div>

    <div id="sec-ajustes" class="aba-content hidden">
        <div class="card">
            <h3>👤 Gestão da Turma</h3>
            <select id="ajuste-turma-select" onchange="listarAlunosParaEdicao()"></select>
            <div style="margin-top:10px; display:flex; gap:5px;">
                <input type="text" id="novo-aluno-nome" placeholder="Nome do novo aluno">
                <button class="btn-main" style="margin:0; width:80px" onclick="adicionarUmAluno()">Add</button>
            </div>
            <div id="lista-edicao-alunos" style="margin-top:15px; max-height:200px; overflow-y:auto;"></div>
        </div>
        <div class="card" style="border: 2px solid var(--danger)">
            <h3 style="color:var(--danger)">🧹 Limpeza de Ano Novo</h3>
            <button class="btn-main" style="background:var(--danger)" onclick="resetTotal()">APAGAR TUDO</button>
        </div>
    </div>
</div>

<script>
    // Configurações do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCTu2YNF6TXWGdjBtRrDW1dL5e5MoIPI4c",
        authDomain: "classroom-b14f4.firebaseapp.com",
        projectId: "classroom-b14f4",
        storageBucket: "classroom-b14f4.firebasestorage.app",
        messagingSenderId: "426978927988",
        appId: "1:426978927988:web:370dee295ba6881e0bb821"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function logar() {
        if(document.getElementById('senha').value === '2203') {
            document.getElementById('aba-login').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
            document.getElementById('app').classList.remove('hidden');
            inicializarApp();
        } else { alert('Senha incorreta!'); }
    }

    function mudarAba(id) {
        document.querySelectorAll('.aba-content').forEach(a => a.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('sec-' + id).classList.remove('hidden');
        document.getElementById('nb-' + id).classList.add('active');
        if(id === 'diario') carregarHistorico();
    }

    function inicializarApp() {
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('visto-data').value = hoje;
        let hHtml = '';
        for(let i=1; i<=6; i++) hHtml += `<input type="text" id="h${i}" placeholder="Ativ ${i}" onchange="salvarHeaders()">`;
        document.getElementById('visto-headers').innerHTML = hHtml;
        carregarTurmas();
    }

    function carregarTurmas() {
        db.ref('turmas').on('value', snap => {
            const turmas = snap.val() || {};
            let options = ''; let checks = '';
            Object.keys(turmas).forEach(t => {
                options += `<option value="${t}">${t}</option>`;
                checks += `<label><input type="checkbox" class="check-replicar" value="${t}"> ${t}</label>`;
            });
            document.getElementById('visto-turma').innerHTML = options;
            document.getElementById('ajuste-turma-select').innerHTML = options;
            document.getElementById('hist-turma-select').innerHTML = options;
            document.getElementById('lista-replicar').innerHTML = checks;
            carregarAlunos();
        });
    }

    async function carregarAlunos() {
        const t = document.getElementById('visto-turma').value;
        const d = document.getElementById('visto-data').value;
        if(!t) return;
        const [sAl, sVi, sHe] = await Promise.all([db.ref('turmas/'+t).once('value'), db.ref(`vistos/${t}/${d}`).once('value'), db.ref(`headers/${t}`).once('value')]);
        const alunos = sAl.val() || []; const vistos = sVi.val() || {}; const headers = sHe.val() || {};
        for(let i=1; i<=6; i++) document.getElementById('h'+i).value = headers['h'+i] || '';
        document.getElementById('thr-vistos').innerHTML = `<th>Aluno</th>` + Array.from({length:6}, (_,i)=>`<th style="text-align:center">${i+1}</th>`).join('');
        let html = '';
        alunos.forEach((nome, idx) => {
            html += `<tr><td>${nome}</td>`;
            for(let v=1; v<=6; v++) {
                const c = (vistos[idx] && vistos[idx][v]) ? 'checked' : '';
                html += `<td><div class="visto-container"><input type="checkbox" class="chk-v" data-idx="${idx}" data-v="${v}" ${c}><span class="tick">✓</span></div></td>`;
            }
            html += `</tr>`;
        });
        document.querySelector('#tabela-vistos tbody').innerHTML = html;
    }

    function salvarVistos() {
        const t = document.getElementById('visto-turma').value;
        const d = document.getElementById('visto-data').value;
        let dados = {};
        document.querySelectorAll('.chk-v').forEach(el => {
            const {idx, v} = el.dataset;
            if(!dados[idx]) dados[idx] = {};
            dados[idx][v] = el.checked;
        });
        db.ref(`vistos/${t}/${d}`).set(dados).then(() => alert("✅ Histórico de vistos atualizado!"));
    }

    function carregarHistorico() {
        const t = document.getElementById('hist-turma-select').value;
        db.ref(`diarios/${t}`).once('value', snap => {
            const data = snap.val() || {};
            let html = '';
            Object.entries(data).reverse().forEach(([id, item]) => {
                html += `<div class="hist-item">
                    <div><strong>${item.data.split('-').reverse().join('/')}:</strong> ${item.conteudo}</div>
                    <button class="btn-edit-small" onclick="prepararEdicao('${item.conteudo}')">Editar</button>
                </div>`;
            });
            document.getElementById('lista-historico').innerHTML = html;
        });
    }

    function prepararEdicao(texto) {
        document.getElementById('diario-texto').value = texto;
        window.scrollTo(0,0);
    }

    function salvarDiario() {
        const txt = document.getElementById('diario-texto').value;
        const data = document.getElementById('visto-data').value;
        const sel = Array.from(document.querySelectorAll('.check-replicar:checked')).map(c => c.value);
        sel.push(document.getElementById('visto-turma').value);
        if(!txt) return alert("Digite o conteúdo!");
        [...new Set(sel)].forEach(t => db.ref(`diarios/${t}`).push({ data, conteudo: txt }));
        alert("✅ Conteúdo salvo!");
        carregarHistorico();
    }

    function resetTotal() {
        if(confirm("🚨 ISSO APAGARÁ TUDO! Turmas, Alunos, Notas e Diários. Confirma?")) {
            db.ref('/').remove().then(() => location.reload());
        }
    }

    // Funções de Apoio (Mantidas do anterior)
    function listarAlunosParaEdicao() {
        const t = document.getElementById('ajuste-turma-select').value;
        db.ref('turmas/'+t).once('value', snap => {
            const alunos = snap.val() || [];
            let html = '';
            alunos.forEach((nome, idx) => {
                html += `<div style="display:flex; gap:5px; margin-bottom:5px;">
                    <input type="text" value="${nome}" id="edit-aluno-${idx}" style="margin:0; height:30px; font-size:12px;">
                    <button class="btn-edit-small" onclick="salvarEdicaoAluno(${idx})">Salvar</button>
                </div>`;
            });
            document.getElementById('lista-edicao-alunos').innerHTML = html;
        });
    }

    function salvarEdicaoAluno(idx) {
        const t = document.getElementById('ajuste-turma-select').value;
        const novo = document.getElementById(`edit-aluno-${idx}`).value;
        db.ref(`turmas/${t}/${idx}`).set(novo).then(() => alert("Nome editado!"));
    }

    function adicionarUmAluno() {
        const t = document.getElementById('ajuste-turma-select').value;
        const nome = document.getElementById('novo-aluno-nome').value.toUpperCase();
        if(!nome) return;
        db.ref('turmas/'+t).once('value', snap => {
            let alunos = snap.val() || [];
            alunos.push(nome);
            db.ref('turmas/'+t).set(alunos).then(() => {
                alert("Aluno Adicionado!");
                document.getElementById('novo-aluno-nome').value = "";
                listarAlunosParaEdicao();
            });
        });
    }

    async function gerarRelatorio() {
        const t = document.getElementById('visto-turma').value;
        const [sAl, sVi] = await Promise.all([db.ref('turmas/'+t).once('value'), db.ref(`vistos/${t}`).once('value')]);
        const alunos = sAl.val() || []; const todos = sVi.val() || {};
        let res = alunos.map(nome => ({ nome, total: 0 }));
        Object.values(todos).forEach(dia => {
            Object.entries(dia).forEach(([idx, v]) => { if(res[idx]) res[idx].total += Object.values(v).filter(x => x === true).length; });
        });
        let teto = Math.max(...res.map(a => a.total), 1);
        let h = `<table><thead><tr><th>Aluno</th><th>Vistos</th><th>Nota</th></tr></thead><tbody>`;
        res.forEach(a => {
            let nota = ((a.total * 10) / teto).toFixed(1).replace('.', ',');
            h += `<tr><td>${a.nome}</td><td>${a.total}</td><td style="color:var(--accent); font-weight:bold">${nota}</td></tr>`;
        });
        document.getElementById('relatorio-final').innerHTML = h + `</tbody></table>`;
    }

    function exportarParaSIAP() {
        let d = {};
        document.querySelectorAll('#relatorio-final tr').forEach((tr, i) => {
            if(i>0) d[tr.cells[0].innerText.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")] = tr.cells[2].innerText;
        });
        navigator.clipboard.writeText(JSON.stringify(d)).then(() => alert("Notas copiadas!"));
    }

    function salvarHeaders() {
        const t = document.getElementById('visto-turma').value;
        let h = {}; for(let i=1; i<=6; i++) h['h'+i] = document.getElementById('h'+i).value;
        db.ref(`headers/${t}`).set(h);
    }
</script>
</body>
</html>
